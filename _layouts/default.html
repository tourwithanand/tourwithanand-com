<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    /* Global Styles */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;600&display=swap');
    body, html { margin: 0; padding: 0; background-color: #0a0b0e; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
    h1, h2, h3, .anand-name { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; }
    .section-container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }
    .luxury-header { width: 100vw; position: fixed; top: 0; left: 0; background: rgba(10, 11, 14, 0.85); backdrop-filter: blur(12px); z-index: 1000; padding: 12px 0; border-bottom: 1px solid rgba(255, 204, 0, 0.1); }
    .header-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: flex-start; align-items: center; padding: 0 40px; gap: 50px; }
    .header-logo img { height: 55px; }
    .header-nav ul { display: flex; gap: 35px; list-style: none; margin: 0; padding: 0; }
    .header-nav a { color: #fff; text-decoration: none; font-size: 13px; text-transform: uppercase; }
    .header-nav a:hover { color: #ffcc00; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .hamburger span { width: 26px; height: 2px; background: #ffcc00; }
    .mobile-nav-overlay { position: fixed; top: 0; right: -100%; width: 100vw; height: 100vh; background: rgba(5, 6, 8, 0.98); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: right 0.4s; }
    .mobile-nav-overlay.active { right: 0; }
    .close-menu { position: absolute; top: 25px; right: 30px; font-size: 30px; color: #fff; cursor: pointer; }
    .mobile-nav-list { list-style: none; padding: 0; margin: 0; text-align: center; }
    .mobile-nav-list li { margin: 25px 0; }
    .mobile-nav-list a { font-family: 'Playfair Display', serif; color: #fff; font-size: 26px; text-decoration: none; }
    .luxury-footer { background: #050608; border-top: 1px solid rgba(255,204,0,0.1); width: 100vw; padding: 60px 0; text-align: center; color: #a0a4ab; }
    .footer-logo { height: 65px; margin-bottom: 20px; }
    .floating-widgets { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 999; }
    .float-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    .float-wa { background: #25d366; }
    .float-call { background: #1c66c9; }
    @media (max-width: 1100px) { .header-nav, .header-phone-section { display: none; } .hamburger { display: flex; } }
  </style>
</head>
<body>

<header class="luxury-header">

    </div>
    <nav class="header-nav">
      <ul>
        <li><a href="http://tourwithanand.in/tourwithanand-com/">Home</a></li>

        <li><a href="https://tourwithanand.in/tourwithanand-com/tempo-traveller-rentals-kochi-kerala.html">Tempo Rentals</a></li>
        <li><a href="https://tourwithanand.in/tourwithanand-com/south-india-tours.html">South India Tours</a></li>
        <li><a href="https://tourwithanand.in/tourwithanand-com/customer-reviews.html">Reviews</a></li>
      </ul>
    </nav>
    <div class="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></div>
  </div>
</header>

<div class="mobile-nav-overlay" id="mobileNav">
  <div class="close-menu" onclick="toggleMobileMenu()">✕</div>
  <ul class="mobile-nav-list">
    <li><a href="http://tourwithanand.in/tourwithanand-com/" onclick="toggleMobileMenu()">Home</a></li>
    <li><a href="https://tourwithanand.in/tourwithanand-com/about-us.html" onclick="toggleMobileMenu()">About Us</a></li>
    <li><a href="https://tourwithanand.in/tourwithanand-com/24x7-kochi-airport-taxi-service.html" onclick="toggleMobileMenu()">Kochi Airport Taxi</a></li>
